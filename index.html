<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<title>femclient MC 1.12</title>

<link rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />

<script src="bootstrap.js"></script>

<script>
"use strict";
window.addEventListener("load", function() {

    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", primary: relayId == 2 }
        ]
    };

    main();

    // ===== STATE =====
    let autoClick = false;
    let holdMode = false;
    let delay = 100;
    let interval = null;

    let clicks = 0;
    let cps = 0;

    let keys = {};

    function getCanvas(){
        return document.querySelector("canvas");
    }

    // ===== CLICK LOGIC =====
    function spamClick(){
        const c = getCanvas();
        if(!c) return;

        c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
        c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
        clicks++;
    }

    function holdClick(){
        const c = getCanvas();
        if(!c) return;
        c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
    }

    function releaseClick(){
        const c = getCanvas();
        if(!c) return;
        c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
    }

    function start(){
        if(interval) return;

        if(holdMode){
            holdClick();
        } else {
            interval = setInterval(spamClick, delay);
        }
    }

    function stop(){
        if(interval){
            clearInterval(interval);
            interval = null;
        }
        if(holdMode){
            releaseClick();
        }
    }

    // ===== CPS TRACK (ALL clicks) =====
    document.addEventListener("mousedown",(e)=>{
        if(e.button === 0) clicks++;
        keys["LMB"] = true;
        if(e.button === 2) keys["RMB"] = true;
    });

    document.addEventListener("mouseup",(e)=>{
        if(e.button === 0) keys["LMB"] = false;
        if(e.button === 2) keys["RMB"] = false;
    });

    setInterval(()=>{
        cps = clicks;
        clicks = 0;
        if(cpsBox) cpsBox.textContent = "CPS: " + cps;
    },1000);

    // ===== DRAG =====
    function makeDraggable(el){
        let drag=false, ox=0, oy=0;
        el.addEventListener("mousedown",(e)=>{
            if(locked) return;
            drag=true;
            ox=e.clientX-el.offsetLeft;
            oy=e.clientY-el.offsetTop;
        });
        document.addEventListener("mousemove",(e)=>{
            if(!drag) return;
            el.style.left=(e.clientX-ox)+"px";
            el.style.top=(e.clientY-oy)+"px";
        });
        document.addEventListener("mouseup",()=>drag=false);
    }

    function updateLock(){
        const val = locked ? "none" : "auto";
        cpsBox.style.pointerEvents = val;
        keysBox.style.pointerEvents = val;
    }

    // ===== UI =====
    let menu, cpsBox, keysBox;
    let locked = true;

    setTimeout(()=>{

        // MENU
        menu = document.createElement("div");
        menu.style.position="fixed";
        menu.style.top="50px";
        menu.style.left="50px";
        menu.style.background="rgba(0,0,0,0.8)";
        menu.style.color="white";
        menu.style.padding="10px";
        menu.style.zIndex="9999";
        menu.style.display="none";

        menu.innerHTML=`
        <b>Femclient</b><br><br>
        AutoClicker: <button id="ac">OFF</button><br>
        Mode: <button id="mode">SPAM</button><br>
        Speed(ms): <input id="spd" type="number" value="100" style="width:60px"><br><br>
        Lock UI: <button id="lock">ON</button>
        `;

        document.body.appendChild(menu);

        document.getElementById("ac").onclick=(e)=>{
            autoClick=!autoClick;
            e.target.textContent=autoClick?"ON":"OFF";
            autoClick?start():stop();
        };

        document.getElementById("mode").onclick=(e)=>{
            holdMode=!holdMode;
            e.target.textContent=holdMode?"HOLD":"SPAM";
            if(autoClick){
                stop();
                start();
            }
        };

        document.getElementById("spd").onchange=(e)=>{
            delay=Math.max(1,parseInt(e.target.value)||100);
            if(autoClick){
                stop();
                start();
            }
        };

        document.getElementById("lock").onclick=(e)=>{
            locked=!locked;
            e.target.textContent=locked?"ON":"OFF";
            updateLock();
        };

        // CPS BOX
        cpsBox=document.createElement("div");
        cpsBox.style.position="fixed";
        cpsBox.style.top="10px";
        cpsBox.style.left="10px";
        cpsBox.style.color="white";
        cpsBox.style.background="rgba(0,0,0,0.5)";
        cpsBox.style.padding="6px";
        cpsBox.style.borderRadius="6px";
        cpsBox.textContent="CPS: 0";
        cpsBox.style.zIndex="9999";
        document.body.appendChild(cpsBox);
        makeDraggable(cpsBox);

        // KEYS BOX
        keysBox=document.createElement("div");
        keysBox.style.position="fixed";
        keysBox.style.top="80px";
        keysBox.style.left="10px";
        keysBox.style.color="white";
        keysBox.style.background="rgba(0,0,0,0.5)";
        keysBox.style.padding="6px";
        keysBox.style.borderRadius="6px";
        keysBox.style.zIndex="9999";
        document.body.appendChild(keysBox);
        makeDraggable(keysBox);

        updateLock();

    },2000);

    // ===== KEY DISPLAY =====
    document.addEventListener("keydown",(e)=>keys[e.code]=true);
    document.addEventListener("keyup",(e)=>keys[e.code]=false);

    setInterval(()=>{
        if(!keysBox) return;

        function keyBox(name, active){
            return `<span style="
                display:inline-block;
                width:30px;
                height:30px;
                line-height:30px;
                margin:2px;
                text-align:center;
                background:${active?"white":"rgba(255,255,255,0.2)"};
                color:${active?"black":"white"};
                border-radius:4px;
            ">${name}</span>`;
        }

        keysBox.innerHTML = `
            <div style="text-align:center">
                ${keyBox("W",keys["KeyW"])}
            </div>
            <div>
                ${keyBox("A",keys["KeyA"])}
                ${keyBox("S",keys["KeyS"])}
                ${keyBox("D",keys["KeyD"])}
            </div>
            <div>
                ${keyBox("LMB",keys["LMB"])}
                ${keyBox("RMB",keys["RMB"])}
            </div>
        `;
    },50);

    // MENU TOGGLE
    document.addEventListener("keydown",(e)=>{
        if(e.code==="AltLeft"||e.code==="AltRight"){
            if(menu) menu.style.display = menu.style.display==="none"?"block":"none";
        }
    });

});
</script>
</head>

<body id="game_frame" style="margin:0;width:100%;height:100%;overflow:hidden;background:black;"></body>
</html>
