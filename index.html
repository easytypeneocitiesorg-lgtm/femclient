<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
<meta name="description" content="Play minecraft 1.12 in your browser" />
<meta name="keywords" content="eaglercraft, minecraft, 1.12, 1.12.2" />
<title>femclient MC 1.12</title>
<link type="image/png" rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />
<script type="text/javascript" src="bootstrap.js"></script>
<script type="text/javascript">
"use strict";
window.addEventListener("load", function() {
    if(window.location.href.indexOf("file:") === 0) {
        alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
        return;
    }

    // ------------------------- launch options -------------------------
    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
        ]
    };
    // -------------------------------------------------------------------

    var q = window.location.search;
    if((typeof q === "string") && q[0] === "?" && (typeof window.URLSearchParams !== "undefined")) {
        q = new window.URLSearchParams(q);
        var s = q.get("server");
        if(s) window.eaglercraftXOpts.joinServer = s;
    }

    main(); // initialize the game container

    // -------------------- watermark + press Z hint --------------------
    const watermark = document.createElement("div");
    watermark.textContent = "femclient";
    watermark.className = "noselect";
    watermark.style.position="fixed";
    watermark.style.bottom="10px";
    watermark.style.right="15px";
    watermark.style.color="white";
    watermark.style.opacity="0.7";
    watermark.style.fontSize="18px";
    watermark.style.fontFamily="sans-serif";
    watermark.style.userSelect="none";
    document.body.appendChild(watermark);

    const hint = document.createElement("div");
    hint.textContent="press Z!";
    hint.className="noselect";
    hint.style.position="fixed";
    hint.style.bottom="35px";
    hint.style.right="15px";
    hint.style.color="white";
    hint.style.opacity="0.7";
    hint.style.fontSize="16px";
    hint.style.fontFamily="sans-serif";
    hint.style.userSelect="none";
    document.body.appendChild(hint);

    // -------------------- overlay containers --------------------
    const menu = document.createElement("div");
    menu.id = "femclient_menu";
    menu.style.position = "fixed";
    menu.style.top = "50px";
    menu.style.left = "50px";
    menu.style.width = "220px";
    menu.style.backgroundColor = "rgba(0,0,0,0.7)";
    menu.style.color="white";
    menu.style.fontFamily="sans-serif";
    menu.style.fontSize="14px";
    menu.style.border="1px solid #aaa";
    menu.style.borderRadius="8px";
    menu.style.padding="10px";
    menu.style.zIndex="9999";
    menu.style.display="none";
    menu.style.cursor="move";
    document.body.appendChild(menu);

    // menu content
    menu.innerHTML = `
        <b>Femclient Menu</b><br><br>
        Autoclicker: <input type="checkbox" id="ac_toggle"><br><br>
        Mode: <select id="ac_mode"><option value="spam">Spam</option><option value="hold">Hold</option></select><br><br>
        Speed (ms): <input type="text" id="ac_speed" placeholder=""><br><br>
        Keybind: <select id="ac_keybind"></select><br><br>
        Lock overlays: <input type="checkbox" id="lock_overlays"><br>
    `;

    // -------------------- CPS counter --------------------
    const cpsBox = document.createElement("div");
    cpsBox.id="cpsBox";
    cpsBox.style.position="fixed";
    cpsBox.style.bottom="80px";
    cpsBox.style.right="15px";
    cpsBox.style.color="white";
    cpsBox.style.backgroundColor="rgba(0,0,0,0.5)";
    cpsBox.style.padding="4px 8px";
    cpsBox.style.borderRadius="4px";
    cpsBox.style.display="none";
    cpsBox.style.userSelect="none";
    document.body.appendChild(cpsBox);

    // -------------------- Key overlay --------------------
    const keyOverlay = document.createElement("div");
    keyOverlay.id="keyOverlay";
    keyOverlay.style.position="fixed";
    keyOverlay.style.bottom="120px";
    keyOverlay.style.right="15px";
    keyOverlay.style.backgroundColor="rgba(0,0,0,0.5)";
    keyOverlay.style.padding="5px";
    keyOverlay.style.borderRadius="6px";
    keyOverlay.style.color="white";
    keyOverlay.style.display="none";
    keyOverlay.style.userSelect="none";
    keyOverlay.innerHTML = `
        W A S D<br>LMB RMB
    `;
    document.body.appendChild(keyOverlay);

    // -------------------- Autoclicker logic --------------------
    let autoclickerOn=false;
    let acSpeed=100;
    let acMode="spam";
    let clicks=0;
    let acKey="Mouse1";

    const acToggle=document.getElementById("ac_toggle");
    const acSpeedInput=document.getElementById("ac_speed");
    const acModeSelect=document.getElementById("ac_mode");
    const acKeybindSelect=document.getElementById("ac_keybind");

    // fill keybind dropdown
    const keys=["a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z"];
    keys.forEach(k=>{let o=document.createElement("option");o.value=k;o.textContent=k.toUpperCase();acKeybindSelect.appendChild(o);});

    acToggle.addEventListener("change",()=>{autoclickerOn=acToggle.checked;cpsBox.style.display=autoclickerOn?"block":"none";});
    acSpeedInput.addEventListener("input",()=>{acSpeed=parseInt(acSpeedInput.value)||100;});
    acModeSelect.addEventListener("change",()=>{acMode=acModeSelect.value;});
    acKeybindSelect.addEventListener("change",()=>{acKey=acKeybindSelect.value;});

    // handle clicking
    setInterval(()=>{
        if(autoclickerOn){
            clicks++;
            if(acMode==="spam") window.dispatchEvent(new MouseEvent("mousedown",{bubbles:true}));
        }
    }, acSpeed);

    // CPS update
    setInterval(()=>{
        cpsBox.textContent="CPS: "+clicks;
        clicks=0;
    },1000);

    // -------------------- menu toggle --------------------
    document.addEventListener("keydown",e=>{
        if(e.key.toLowerCase()==="z"){
            menu.style.display=(menu.style.display==="none")?"block":"none";
        }
    });
});
</script>
</head>
<body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
