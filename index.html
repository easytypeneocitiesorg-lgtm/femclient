<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<title>femclient MC 1.12</title>

<link rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />

<script src="bootstrap.js"></script>

<script>
"use strict";
window.addEventListener("load", function() {

    // ===== GAME INIT =====
    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", primary: relayId == 2 }
        ]
    };

    main();

    // ===== GLOBAL STATE =====
    let autoClick = false;
    let clickDelay = 100;
    let cpsEnabled = true;
    let keysEnabled = true;
    let locked = true;

    let clickInterval = null;
    let clicks = 0;
    let cps = 0;

    // ===== UTIL =====
    function getCanvas(){
        return document.querySelector("canvas");
    }

    function simulateClick(){
        const c = getCanvas();
        if(!c) return;
        c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
        c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
        clicks++;
    }

    function startClicker(){
        if(clickInterval) return;
        clickInterval = setInterval(simulateClick, clickDelay);
    }

    function stopClicker(){
        if(clickInterval){
            clearInterval(clickInterval);
            clickInterval = null;
        }
    }

    // ===== CPS TRACK =====
    setInterval(()=>{
        cps = clicks;
        clicks = 0;
        if(cpsBox) cpsBox.textContent = "CPS: " + cps;
    },1000);

    // ===== DRAG SYSTEM =====
    function makeDraggable(el){
        let dragging = false, offX=0, offY=0;

        el.addEventListener("mousedown",(e)=>{
            if(locked) return;
            dragging = true;
            offX = e.clientX - el.offsetLeft;
            offY = e.clientY - el.offsetTop;
        });

        document.addEventListener("mousemove",(e)=>{
            if(!dragging) return;
            el.style.left = (e.clientX - offX) + "px";
            el.style.top = (e.clientY - offY) + "px";
        });

        document.addEventListener("mouseup",()=> dragging=false);
    }

    function updateLock(){
        const val = locked ? "none" : "auto";
        if(cpsBox) cpsBox.style.pointerEvents = val;
        if(keysBox) keysBox.style.pointerEvents = val;
    }

    // ===== UI CREATE =====
    let menu, cpsBox, keysBox;

    setTimeout(()=>{

        // ===== MENU =====
        menu = document.createElement("div");
        menu.style.position = "fixed";
        menu.style.top = "50px";
        menu.style.left = "50px";
        menu.style.background = "rgba(0,0,0,0.8)";
        menu.style.color = "white";
        menu.style.padding = "10px";
        menu.style.zIndex = "9999";
        menu.style.display = "none";
        menu.style.fontFamily = "Arial";

        menu.innerHTML = `
            <b>Femclient</b><br><br>

            AutoClicker: <button id="ac_toggle">OFF</button><br>
            Speed(ms): <input id="ac_speed" type="number" value="100" style="width:60px"><br><br>

            CPS Display: <button id="cps_toggle">ON</button><br>
            Key Display: <button id="keys_toggle">ON</button><br><br>

            Lock UI: <button id="lock_toggle">ON</button>
        `;

        document.body.appendChild(menu);

        // ===== BUTTON HOOKS =====
        document.getElementById("ac_toggle").onclick = (e)=>{
            autoClick = !autoClick;
            e.target.textContent = autoClick ? "ON" : "OFF";
            autoClick ? startClicker() : stopClicker();
        };

        document.getElementById("ac_speed").onchange = (e)=>{
            clickDelay = Math.max(10, Math.min(500, parseInt(e.target.value)||100));
            if(autoClick){
                stopClicker();
                startClicker();
            }
        };

        document.getElementById("cps_toggle").onclick = (e)=>{
            cpsEnabled = !cpsEnabled;
            e.target.textContent = cpsEnabled ? "ON" : "OFF";
            cpsBox.style.display = cpsEnabled ? "block" : "none";
        };

        document.getElementById("keys_toggle").onclick = (e)=>{
            keysEnabled = !keysEnabled;
            e.target.textContent = keysEnabled ? "ON" : "OFF";
            keysBox.style.display = keysEnabled ? "block" : "none";
        };

        document.getElementById("lock_toggle").onclick = (e)=>{
            locked = !locked;
            e.target.textContent = locked ? "ON" : "OFF";
            updateLock();
        };

        // ===== CPS BOX =====
        cpsBox = document.createElement("div");
        cpsBox.style.position = "fixed";
        cpsBox.style.top = "10px";
        cpsBox.style.left = "10px";
        cpsBox.style.color = "white";
        cpsBox.textContent = "CPS: 0";
        cpsBox.style.zIndex = "9999";
        document.body.appendChild(cpsBox);
        makeDraggable(cpsBox);

        // ===== KEYS BOX =====
        keysBox = document.createElement("div");
        keysBox.style.position = "fixed";
        keysBox.style.top = "80px";
        keysBox.style.left = "10px";
        keysBox.style.color = "white";
        keysBox.style.zIndex = "9999";
        document.body.appendChild(keysBox);
        makeDraggable(keysBox);

        updateLock();

    },2000);

    // ===== KEY TRACK =====
    let keys = {};
    document.addEventListener("keydown",e=> keys[e.code]=true);
    document.addEventListener("keyup",e=> keys[e.code]=false);

    setInterval(()=>{
        if(keysBox && keysEnabled){
            keysBox.innerHTML = `
                ${keys["KeyW"]?"W ":""}<br>
                ${keys["KeyA"]?"A ":""}${keys["KeyS"]?"S ":""}${keys["KeyD"]?"D ":""}<br>
                ${keys["Mouse0"]?"LMB":""}
            `;
        }
    },100);

    document.addEventListener("mousedown",()=>keys["Mouse0"]=true);
    document.addEventListener("mouseup",()=>keys["Mouse0"]=false);

    // ===== MENU TOGGLE =====
    document.addEventListener("keydown",(e)=>{
        if(e.code === "AltLeft" || e.code === "AltRight"){
            if(menu) menu.style.display = menu.style.display === "none" ? "block" : "none";
        }
    });

});
</script>
</head>

<body id="game_frame" style="margin:0;width:100%;height:100%;overflow:hidden;background:black;"></body>
</html>
