<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<title>femclient MC 1.12</title>

<link rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />
<script src="bootstrap.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

.menu {
    backdrop-filter: blur(6px);
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transform: scale(0.95);
    opacity: 0;
    transition: all 0.2s ease;
}
.menu.show { transform: scale(1); opacity: 1; }

.noselect { user-select:none; -webkit-user-select:none; }
.box {
    background: rgba(0,0,0,0.5);
    padding:6px;
    border-radius:6px;
    color:white;
    position:fixed;
}
.key {
    display:inline-block;
    width:32px;height:32px;
    line-height:32px;
    text-align:center;
    margin:2px;
    border-radius:6px;
    background:rgba(255,255,255,0.2);
}
.key.active {
    background:white;
    color:black;
}
</style>

<script>
"use strict";
window.addEventListener("load", function() {

    // ===== ORIGINAL CONFIG (UNCHANGED) =====
    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", primary: relayId == 2 }
        ]
    };

    main();

    setTimeout(()=>{

        // ===== STATE =====
        let autoClick=false;
        let holdMode=false;
        let perfect=false;
        let mode="sword";

        let delay=100;
        let interval=null;
        let holding=false;

        let cps=0, clicks=0;
        let keys={};
        let locked=false;

        let keybindAC="KeyV";
        let keybindPT="KeyB";

        function canvas(){ return document.querySelector("canvas"); }

        function click(){
            const c=canvas(); if(!c) return;
            c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
            c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
            clicks++;
        }

        function getDelay(){
            if(perfect){
                if(mode==="sword") return 630;
                if(mode==="axe") return 1205;
            }
            return delay;
        }

        function start(){
            if(interval) clearInterval(interval);

            if(holdMode){
                const c=canvas();
                if(c && !holding){
                    c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
                    holding=true;
                }
                return;
            }

            interval=setInterval(()=>{
                if(autoClick) click();
                if(perfect && keys["LMB"]) click();
            }, getDelay());
        }

        function stop(){
            if(interval){ clearInterval(interval); interval=null; }
            if(holding){
                const c=canvas();
                if(c) c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
                holding=false;
            }
        }

        // ===== MENU =====
        const menu=document.createElement("div");
        menu.className="menu noselect";
        menu.style.position="fixed";
        menu.style.top="50px";
        menu.style.left="50px";
        menu.style.background="rgba(20,20,20,0.9)";
        menu.style.color="white";
        menu.style.padding="12px";
        menu.style.display="none";

        function keyOptions(){
            let keys="ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890".split("");
            return keys.map(k=>`<option value="Key${k}">${k}</option>`).join("");
        }

        menu.innerHTML=`
        <b>Femclient</b><br><br>

        AutoClicker <button id="ac">OFF</button><br>
        Hold Mode <button id="hold">OFF</button><br>
        Perfect Timing <button id="pt">OFF</button><br><br>

        Mode:
        <select id="mode">
            <option value="sword">Sword</option>
            <option value="axe">Axe</option>
        </select><br><br>

        Speed(ms): <input id="spd" type="text" placeholder="" style="width:60px"><br><br>

        AC Key:
        <select id="acKey">${keyOptions()}</select><br>

        PT Key:
        <select id="ptKey">${keyOptions()}</select><br><br>

        CPS <button id="cpsT">OFF</button><br>
        Keys <button id="keysT">OFF</button><br>
        Lock UI <button id="lock">OFF</button>
        `;

        document.body.appendChild(menu);

        // ===== WATERMARK =====
        const wm=document.createElement("div");
        wm.textContent="femclient";
        wm.className="noselect";
        wm.style.position="fixed";
        wm.style.bottom="10px";
        wm.style.right="15px";
        wm.style.color="white";
        document.body.appendChild(wm);

        // ===== CPS =====
        const cpsBox=document.createElement("div");
        cpsBox.className="box noselect";
        cpsBox.style.left="10px";
        cpsBox.style.top="10px";
        cpsBox.style.display="none";
        document.body.appendChild(cpsBox);

        setInterval(()=>{
            cpsBox.textContent="CPS: "+cps;
            cps=clicks; clicks=0;
        },1000);

        // ===== KEYS =====
        const keysBox=document.createElement("div");
        keysBox.className="box noselect";
        keysBox.style.left="10px";
        keysBox.style.top="80px";
        keysBox.style.display="none";
        document.body.appendChild(keysBox);

        function k(n,a){ return `<span class="key ${a?"active":""}">${n}</span>`; }

        setInterval(()=>{
            keysBox.innerHTML=`
            <div>${k("W",keys["KeyW"])}</div>
            <div>${k("A",keys["KeyA"])}${k("S",keys["KeyS"])}${k("D",keys["KeyD"])}</div>
            <div>${k("LMB",keys["LMB"])}${k("RMB",keys["RMB"])}</div>
            `;
        },50);

        // ===== BUTTONS =====
        document.getElementById("ac").onclick=e=>{
            autoClick=!autoClick;
            e.target.textContent=autoClick?"ON":"OFF";
            autoClick?start():stop();
        };

        document.getElementById("hold").onclick=e=>{
            holdMode=!holdMode;
            e.target.textContent=holdMode?"ON":"OFF";
            stop(); start();
        };

        document.getElementById("pt").onclick=e=>{
            perfect=!perfect;
            e.target.textContent=perfect?"ON":"OFF";
            start();
        };

        document.getElementById("mode").onchange=e=>{
            mode=e.target.value;
            start();
        };

        const spd=document.getElementById("spd");

        spd.addEventListener("input",e=>{
            let v=parseInt(e.target.value.replace(/[^0-9]/g,""));
            if(isNaN(v)||v<1) delay=100;
            else delay=v;
            start();
        });

        document.getElementById("acKey").onchange=e=> keybindAC=e.target.value;
        document.getElementById("ptKey").onchange=e=> keybindPT=e.target.value;

        document.getElementById("cpsT").onclick=e=>{
            cpsBox.style.display=cpsBox.style.display==="none"?"block":"none";
            e.target.textContent=cpsBox.style.display==="none"?"OFF":"ON";
        };

        document.getElementById("keysT").onclick=e=>{
            keysBox.style.display=keysBox.style.display==="none"?"block":"none";
            e.target.textContent=keysBox.style.display==="none"?"OFF":"ON";
        };

        document.getElementById("lock").onclick=e=>{
            locked=!locked;
            const pe=locked?"none":"auto";
            cpsBox.style.pointerEvents=pe;
            keysBox.style.pointerEvents=pe;
            e.target.textContent=locked?"ON":"OFF";
        };

        // ===== INPUT =====
        document.addEventListener("keydown",e=>{
            keys[e.code]=true;

            if(e.code==="KeyZ"){
                const show=menu.style.display==="none";
                menu.style.display=show?"block":"none";
                setTimeout(()=>menu.classList.toggle("show",show),10);
            }

            if(e.code===keybindAC){
                autoClick=!autoClick;
                autoClick?start():stop();
            }

            if(e.code===keybindPT){
                perfect=!perfect;
                start();
            }
        });

        document.addEventListener("keyup",e=>keys[e.code]=false);
        document.addEventListener("mousedown",e=>{
            if(e.button===0) keys["LMB"]=true;
            if(e.button===2) keys["RMB"]=true;
        });
        document.addEventListener("mouseup",e=>{
            if(e.button===0) keys["LMB"]=false;
            if(e.button===2) keys["RMB"]=false;
        });

    },1500);

});
</script>
</head>

<body id="game_frame"></body>
</html>
