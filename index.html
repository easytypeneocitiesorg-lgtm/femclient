<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>femclient MC 1.12</title>

<link rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />

<script src="bootstrap.js"></script>

<script>
"use strict";
window.addEventListener("load", function() {

    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", primary: relayId == 2 }
        ]
    };

    main();

    // ===== Persistent Watermark =====
    (function(){
        const id = "femclientWM";
        function create(){
            if(document.getElementById(id)) return;
            const wm = document.createElement("div");
            wm.id = id;
            wm.textContent = "femclient";
            wm.style.position = "fixed";
            wm.style.bottom = "10px";
            wm.style.right = "15px";
            wm.style.color = "rgba(255,255,255,0.8)";
            wm.style.fontSize = "24px";
            wm.style.fontWeight = "bold";
            wm.style.pointerEvents = "none";
            wm.style.zIndex = "9999";
            wm.style.textShadow = "0 0 8px white";
            document.body.appendChild(wm);
        }
        create();
        new MutationObserver(create).observe(document.body,{childList:true,subtree:true});
    })();

    // ===== FIXED Auto Clicker =====
    (function(){
        let enabled = false;
        let interval = null;
        let delay = 100;

        // Create UI safely (after bootstrap nukes DOM)
        function ensureUI(){
            if(document.getElementById("ac_panel")) return;

            const panel = document.createElement("div");
            panel.id = "ac_panel";
            panel.style.position = "fixed";
            panel.style.top = "10px";
            panel.style.left = "10px";
            panel.style.color = "white";
            panel.style.fontFamily = "Arial";
            panel.style.fontSize = "16px";
            panel.style.zIndex = "9999";
            panel.style.display = "none";
            panel.style.background = "rgba(0,0,0,0.5)";
            panel.style.padding = "6px";
            panel.style.borderRadius = "6px";

            const label = document.createElement("div");
            label.id = "ac_label";

            const input = document.createElement("input");
            input.type = "number";
            input.value = delay;
            input.style.marginTop = "5px";
            input.style.width = "60px";

            input.onchange = () => {
                delay = Math.max(1, parseInt(input.value) || 100);
                if(enabled){
                    stop();
                    start();
                }
            };

            panel.appendChild(label);
            panel.appendChild(input);
            document.body.appendChild(panel);
        }

        function getCanvas(){
            return document.querySelector("canvas");
        }

        function click(){
            const canvas = getCanvas();
            if(!canvas) return;

            canvas.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
            canvas.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
        }

        function start(){
            if(interval) return; // prevent stacking
            interval = setInterval(click, delay);
        }

        function stop(){
            if(interval){
                clearInterval(interval);
                interval = null;
            }
        }

        function updateUI(){
            ensureUI();
            const panel = document.getElementById("ac_panel");
            const label = document.getElementById("ac_label");

            if(enabled){
                label.textContent = "AutoClicker: ON (" + delay + "ms)";
                panel.style.display = "block";
            } else {
                panel.style.display = "none";
            }
        }

        // Keep UI alive even if DOM resets
        new MutationObserver(() => {
            if(enabled) updateUI();
        }).observe(document.body, {childList:true,subtree:true});

        document.addEventListener("keydown", (e)=>{
            if(e.code === "AltLeft" || e.code === "AltRight"){
                enabled = !enabled;

                if(enabled) start();
                else stop();

                updateUI();
            }
        });

    })();

});
</script>
</head>

<body id="game_frame" style="margin:0;width:100%;height:100%;overflow:hidden;background:black;"></body>
</html>
