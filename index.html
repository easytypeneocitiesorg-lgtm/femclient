<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
<head>
<meta charset="UTF-8" />
<title>femclient MC 1.12</title>

<link rel="shortcut icon" href="https://copilot.microsoft.com/th/id/BCO.09157aa1-3f24-45e7-a7ad-e815b68a510e.png" />

<script src="bootstrap.js"></script>

<style>
body { margin:0; width:100%; height:100%; overflow:hidden; background:black; }

.menu {
    backdrop-filter: blur(6px);
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    transform: scale(0.95);
    opacity: 0;
    transition: all 0.2s ease;
}
.menu.show { transform: scale(1); opacity: 1; }

.noselect {
    -webkit-user-select:none;
    user-select:none;
}
</style>

<script>
"use strict";
window.addEventListener("load", function() {

    // ✅ ORIGINAL WORKING CONFIG (UNCHANGED)
    var relayId = Math.floor(Math.random() * 3);
    window.eaglercraftXOpts = {
        demoMode: false,
        container: "game_frame",
        assetsURI: "assets.epw",
        worldsDB: "worlds",
        servers: [],
        relays: [
            { addr: "wss://relay.deev.is/", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", primary: relayId == 2 }
        ]
    };

    main();

    // ===== SAFE DELAY (wait for game to load) =====
    setTimeout(() => {

        // ===== STATE =====
        let autoClick = false;
        let perfectTiming = false;
        let delay = 100;
        let mode = "sword";

        let interval = null;

        let keybindAC = "KeyV";
        let keybindPT = "KeyB";
        let waitingKey = null;

        let keys = {};

        function getCanvas(){
            return document.querySelector("canvas");
        }

        function click(){
            const c = getCanvas();
            if(!c) return;
            c.dispatchEvent(new MouseEvent("mousedown",{button:0,bubbles:true}));
            c.dispatchEvent(new MouseEvent("mouseup",{button:0,bubbles:true}));
        }

        function getDelay(){
            if(!perfectTiming) return delay;

            if(mode === "sword") return 630;
            if(mode === "axe") return 1205;
        }

        function start(){
            if(interval) clearInterval(interval);

            interval = setInterval(()=>{
                if(autoClick) click();
                if(perfectTiming && keys["LMB"]) click();
            }, getDelay());
        }

        // ===== UI =====
        const menu = document.createElement("div");
        menu.className="menu noselect";
        menu.style.position="fixed";
        menu.style.top="50px";
        menu.style.left="50px";
        menu.style.background="rgba(20,20,20,0.9)";
        menu.style.color="white";
        menu.style.padding="12px";
        menu.style.display="none";

        menu.innerHTML = `
        <b>Femclient</b><br><br>

        AutoClicker: <button id="ac">OFF</button><br>
        Perfect Timing: <button id="pt">OFF</button><br><br>

        Mode:
        <select id="mode">
            <option value="sword">Sword</option>
            <option value="axe">Axe</option>
        </select><br><br>

        Speed(ms): <input id="spd" type="text" value="100" style="width:60px"><br><br>

        AutoClicker Key: <button id="setAC">SET (V)</button><br>
        Timing Key: <button id="setPT">SET (B)</button>
        `;

        document.body.appendChild(menu);

        // watermark
        const wm = document.createElement("div");
        wm.textContent="femclient";
        wm.className="noselect";
        wm.style.position="fixed";
        wm.style.bottom="10px";
        wm.style.right="15px";
        wm.style.color="white";
        document.body.appendChild(wm);

        const hint = document.createElement("div");
        hint.textContent="press Z";
        hint.className="noselect";
        hint.style.position="fixed";
        hint.style.bottom="35px";
        hint.style.right="15px";
        hint.style.color="white";
        hint.style.opacity="0.7";
        document.body.appendChild(hint);

        // ===== BUTTONS =====
        document.getElementById("ac").onclick=(e)=>{
            autoClick=!autoClick;
            e.target.textContent=autoClick?"ON":"OFF";
            start();
        };

        document.getElementById("pt").onclick=(e)=>{
            perfectTiming=!perfectTiming;
            e.target.textContent=perfectTiming?"ON":"OFF";
            start();
        };

        document.getElementById("mode").onchange=(e)=>{
            mode=e.target.value;
            start();
        };

        const spd=document.getElementById("spd");

        spd.addEventListener("input",(e)=>{
            let val=parseInt(e.target.value.replace(/[^0-9]/g,""));
            if(isNaN(val)||val<1){
                delay=100;
            } else delay=val;
            start();
        });

        spd.addEventListener("blur",(e)=>{
            let val=parseInt(e.target.value);
            if(isNaN(val)||val<1){
                e.target.value=100;
                delay=100;
            } else e.target.value=val;
        });

        document.getElementById("setAC").onclick=()=>{
            waitingKey="ac";
        };

        document.getElementById("setPT").onclick=()=>{
            waitingKey="pt";
        };

        // ===== INPUT =====
        document.addEventListener("keydown",(e)=>{

            if(waitingKey){
                if(waitingKey==="ac") keybindAC=e.code;
                if(waitingKey==="pt") keybindPT=e.code;
                waitingKey=null;
                return;
            }

            if(e.code==="KeyZ"){
                const show = menu.style.display==="none";
                menu.style.display = show?"block":"none";
                setTimeout(()=>menu.classList.toggle("show",show),10);
            }

            if(e.code===keybindAC){
                autoClick=!autoClick;
                start();
            }

            if(e.code===keybindPT){
                perfectTiming=!perfectTiming;
                start();
            }

            keys[e.code]=true;
        });

        document.addEventListener("keyup",(e)=>{
            keys[e.code]=false;
        });

        document.addEventListener("mousedown",(e)=>{
            if(e.button===0) keys["LMB"]=true;
        });

        document.addEventListener("mouseup",(e)=>{
            if(e.button===0) keys["LMB"]=false;
        });

    }, 1500);

});
</script>
</head>

<body id="game_frame"></body>
</html>
